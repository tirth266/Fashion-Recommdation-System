<!DOCTYPE html>
<html>
<head>
    <title>Test Registration</title>
</head>
<body>
    <h1>Test Registration API</h1>
    <form id="testForm">
        <input type="text" id="username" placeholder="Username" value="testuser123"><br>
        <input type="email" id="email" placeholder="Email" value="test123@test.com"><br>
        <input type="password" id="password" placeholder="Password" value="password123"><br>
        <button type="submit">Register</button>
    </form>
    <div id="result"></div>

    <script>
        document.getElementById('testForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('result');
            
            const data = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            };
            
            console.log('Sending:', data);
            resultDiv.innerHTML = 'Sending request...';
            
            try {
                const response = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data),
                    credentials: 'include'
                });
                
                const responseData = await response.json();
                console.log('Response:', responseData);
                
                if (response.ok) {
                    resultDiv.innerHTML = `<p style="color: green;">Success! ${JSON.stringify(responseData)}</p>`;
                } else {
                    resultDiv.innerHTML = `<p style="color: red;">Error: ${JSON.stringify(responseData)}</p>`;
                }
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `<p style="color: red;">Exception: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
